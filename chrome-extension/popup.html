<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ozon 选品工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .body { padding: 14px 16px; }
    .status-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .status-label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
    .status-title { font-size: 13px; font-weight: 500; color: #1e293b; line-height: 1.4; }
    .status-meta { display: flex; gap: 12px; margin-top: 8px; }
    .meta-item { font-size: 12px; }
    .meta-item span { color: #94a3b8; }
    .meta-item strong { color: #2563eb; }
    .not-1688 {
      text-align: center;
      padding: 20px 0;
      color: #94a3b8;
      font-size: 13px;
    }
    .not-1688 .icon { font-size: 32px; margin-bottom: 8px; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-success {
      background: #16a34a;
      color: white;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .setting-row label { font-size: 12px; color: #64748b; }
    .setting-row input {
      width: 100px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      text-align: right;
    }
    .divider { height: 1px; background: #e2e8f0; margin: 12px 0; }
    .site-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .site-row label { font-size: 12px; color: #64748b; flex: 1; }
    .site-row input {
      flex: 2;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
    }
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .loading { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🛍️ Ozon 选品工具</h1>
      <p>1688 一键导入</p>
    </div>
  </div>

  <div class="body">
    <div id="content">
      <div class="not-1688">
        <div class="icon">🔍</div>
        <p>请在 1688 商品详情页使用</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
